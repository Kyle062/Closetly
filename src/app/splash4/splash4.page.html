<ion-content class="splash4-container">
  <!-- Background Image with Overlay -->
  <div class="background-image-area">
    <img
      src="../../assets/splash4/BackgroundImageClosetly.png"
      alt="Closet Background"
      class="bg-image"
    />
    <div class="overlay-gradient"></div>

    <div class="logo-overlay">
      <img
        src="../../assets/splash4/closetlyLogo2.png"
        alt="Closetly Logo"
        class="top-logo"
      />
      <p>Your Digital Wardrobe Manager</p>
    </div>
  </div>

  <div class="onboarding-card">
    <div class="card-decoration">
      <div class="accent-line"></div>
    </div>

    <h1>Let's get you Started!</h1>
    <p class="description">
      Organize your closet, discover outfit ideas, and never feel like you have
      "nothing to wear" again. Snap photos of your clothes and let Closetly
      suggest outfits based on the weather.
    </p>

    <div class="button-row">
      <ion-button fill="outline" class="login-btn">LOG IN</ion-button>
      <ion-button class="signup-btn">SIGN UP</ion-button>
    </div>

    <div class="pagination-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</ion-content>
