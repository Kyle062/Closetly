<ion-content [fullscreen]="true" class="main-content">
  <div class="fixed-background">
    <img src="https://placehold.co/800x1600/dfd3c3/ffffff?text=Wardrobe+Background" alt="background">
  </div>

  <div class="content-wrapper">
    <div class="header-row">
      <ion-icon name="arrow-back-outline" class="back-icon"></ion-icon>
      <h1 class="page-title">My Wishlist</h1>
      <ion-icon name="add-circle-outline" class="add-icon"></ion-icon>
    </div>

    <div class="glass-card total-card">
      <p class="total-label">Total Wishlist Value</p>
      <h2 class="total-amount">${{ totalValue | number:'1.2-2' }}</h2>
      
      <div class="priority-legend">
        <span class="legend-item"><i class="dot high"></i> High Priority</span>
        <span class="legend-item"><i class="dot medium"></i> Medium</span>
        <span class="legend-item"><i class="dot low"></i> Low</span>
      </div>
    </div>

    <div class="glass-card product-card" *ngFor="let item of wishlistItems">
      <div class="product-layout">
        <div class="image-container">
          <img [src]="item.image" [alt]="item.name">
        </div>

        <div class="details-container">
          <div class="title-row">
            <h3 class="product-name">{{ item.name }}</h3>
            <i class="priority-dot" [ngClass]="item.priority"></i>
          </div>
          <p class="brand-name">{{ item.brand }}</p>
          <p class="price-text">${{ item.price | number:'1.2-2' }}</p>
          
          <div class="action-buttons">
            <button class="btn-view">
              <ion-icon name="eye-outline"></ion-icon> View
            </button>
            <button class="btn-delete">
              <ion-icon name="trash-outline"></ion-icon> Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
