<ion-content [fullscreen]="true" class="home-content" scroll-y="true">
  <div class="header-section">
    <div class="top-nav">
      <img
        src="../../../assets/homepage/iconLogo.png"
        class="mini-logo"
        alt="logo"
      />

      <div class="search-input">
        <ion-icon name="search-outline"></ion-icon>
        <ion-input placeholder="Search here..."></ion-input>
        <ion-icon name="scan-outline"></ion-icon>
      </div>

      <ion-icon name="options-outline" class="filter-icon"></ion-icon>
    </div>

    <div class="user-card">
      <ion-avatar>
        <img
          src="../../../assets/homepage/profileClosetly.png"
          alt="Profile"
        />
      </ion-avatar>
      <div class="user-info">
        <h2>Hello Kyle!</h2>
        <p>explore and discover outfit ideas</p>
        <div class="weather-row">
          <ion-icon name="cloudy-outline"></ion-icon>
          <span>22°C Sunny</span>
        </div>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="suggestion-card">
      <h3>Today's Suggestion</h3>
      <div class="outfit-preview">
        <div class="img-wrapper">
          <img src="../../../assets/homepage/cloth1.png" alt="Cloth 1" />
        </div>
        <div class="img-wrapper">
          <img src="../../../assets/homepage/cloth2.png" alt="Cloth 2" />
        </div>
        <div class="img-wrapper">
          <img src="../../../assets/homepage/cloth3.png" alt="Cloth 3" />
        </div>
      </div>
      <p class="outfit-desc">Street Wear & Comfortable</p>
      <ion-button expand="block" class="view-outfit-btn"
        >View Full Outfit</ion-button
      >
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <strong>24</strong>
        <span>Items</span>
      </div>
      <div class="stat-box">
        <strong>8</strong>
        <span>Outfits</span>
      </div>
      <div class="stat-box">
        <strong>3</strong>
        <span>Categories</span>
      </div>
      <div class="stat-box">
        <strong>12</strong>
        <span>Favorites</span>
      </div>
    </div>

    <h4 class="section-title">Quick Actions</h4>
    <div class="quick-actions-grid">
      <div class="action-card weather-action">
        <div class="overlay-text">
          <ion-icon name="sunny-outline"></ion-icon>
          <span>Weather Outfit</span>
        </div>
      </div>
      <div class="action-card random-action">
        <div class="overlay-text">
          <ion-icon name="shirt-outline"></ion-icon>
          <span>Random Outfit</span>
        </div>
      </div>
      <div class="action-card search-action">
        <div class="overlay-text">
          <ion-icon name="search-outline"></ion-icon>
          <span>Search</span>
        </div>
      </div>
      <div class="action-card add-action">
        <div class="overlay-text">
          <ion-icon name="add-outline"></ion-icon>
          <span>Add Item</span>
        </div>
      </div>
    </div>

    <!-- Extra spacing for better scrolling -->
    <div class="bottom-spacer"></div>
  </div>
</ion-content>
<app-bottom-nav></app-bottom-nav>
