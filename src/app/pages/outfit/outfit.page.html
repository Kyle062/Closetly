<ion-header class="ion-no-border">
  <ion-toolbar class="custom-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" icon="arrow-back-outline" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="header-title">My Wishlist</ion-title>
    <ion-buttons slot="end">
      <ion-button class="add-btn">
        <ion-icon name="add-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding custom-bg">
  
  <div class="summary-card">
    <div class="summary-label">Total Wishlist Value</div>
    <div class="summary-underline"></div>
    <h1 class="summary-total">$781.99</h1>
    
    <div class="priority-legend">
      <div class="legend-item"><span class="dot high"></span> High Priority</div>
      <div class="legend-item"><span class="dot medium"></span> Medium</div>
      <div class="legend-item"><span class="dot low"></span> Low</div>
    </div>
  </div>

  <div class="items-container">
    <div class="wishlist-card" *ngFor="let item of wishlistItems">
      
      <div class="image-wrapper">
        <img [src]="item.image" alt="Product Image" />
      </div>

      <div class="details-wrapper">
        <div class="priority-indicator" [ngClass]="item.priority"></div>
        
        <h2 class="item-name">{{ item.name }}</h2>
        <p class="item-brand">{{ item.brand }}</p>
        <h3 class="item-price">{{ item.price }}</h3>
        
        <div class="action-buttons">
          <button class="btn view-btn">
            <ion-icon name="eye-outline"></ion-icon> View
          </button>
          <button class="btn delete-btn">
            <ion-icon name="trash-outline"></ion-icon> Delete
          </button>
        </div>
      </div>

    </div>
  </div>
</ion-content>


</ion-footer>
