<ion-content [fullscreen]="true" class="weather-page">
  <div class="top-nav">
    <img
      src="../../../assets/homepage/iconLogo.png"
      alt="logo"
      class="brand-logo"
    />

    <ion-icon name="options-outline" class="menu-icon"></ion-icon>
  </div>

  <div class="bottom-sheet">
    <div class="sheet-header">
      <ion-icon
        name="arrow-back-outline"
        class="back-btn"
        (click)="goBack()"
      ></ion-icon>
      <h1 class="title">Weather Outfit</h1>
      <div class="spacer"></div>
    </div>

    <div class="weather-categories">
      <div
        class="category-btn"
        [class.active]="activeCategory === 'Sunny'"
        (click)="onCategoryClick('Sunny')"
      >
        <ion-icon name="partly-sunny-outline"></ion-icon>
        <span>Sunny</span>
      </div>
      <div
        class="category-btn"
        [class.active]="activeCategory === 'Rainy'"
        (click)="onCategoryClick('Rainy')"
      >
        <ion-icon name="rainy-outline"></ion-icon>
        <span>Rainy</span>
      </div>
      <div
        class="category-btn"
        [class.active]="activeCategory === 'Hot'"
        (click)="onCategoryClick('Hot')"
      >
        <ion-icon name="sunny-outline"></ion-icon>
        <span>Summer</span>
      </div>
      <div
        class="category-btn"
        [class.active]="activeCategory === 'Cold'"
        (click)="onCategoryClick('Cold')"
      >
        <ion-icon name="snow-outline"></ion-icon>
        <span>Winter</span>
      </div>
    </div>

    <div class="suggested-box">
      <h2 class="section-title">Suggested Outfit</h2>

      <ion-list lines="none" class="outfit-list">
        <ion-item class="outfit-item" *ngFor="let item of currentOutfit">
          <ion-thumbnail slot="start">
            <img [src]="item.image" [alt]="item.title" />
          </ion-thumbnail>
          <ion-label>
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
          </ion-label>
        </ion-item>
      </ion-list>

      <ion-button expand="block" class="save-btn" (click)="saveOutfit()"
        >Save this Outfit</ion-button
      >
    </div>

    <div
      class="forecast-banner"
      [style.background-image]="'url(' + forecastBackground + ')'"
    >
      <div class="forecast-content">
        <span class="forecast-label">Today's Forecast</span>
        <div class="forecast-weather">
          <ion-icon
            [name]="activeCategory === 'Rainy' ? 'rainy-outline' : 'partly-sunny-outline'"
          ></ion-icon>
          <span class="temp">{{ weatherData.temperature }}</span>
        </div>
        <span class="condition">{{ weatherData.condition }}</span>
      </div>
    </div>
  </div>
</ion-content>
