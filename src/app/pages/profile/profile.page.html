<ion-content [fullscreen]="true" class="profile-page">
  <div class="top-nav">
    <img
      src="../../../assets/homepage/iconLogo.png"
      alt="logo"
      class="brand-logo"
    />
    <ion-icon name="options-outline" class="menu-icon"></ion-icon>
  </div>

  <div class="profile-header">
    <div class="avatar-wrapper">
      <img
        src="../../../assets/homepage/profileClosetly.png"
        alt="User Avatar"
        class="avatar-img"
      />
      <div class="edit-icon-badge">
        <ion-icon name="pencil-outline"></ion-icon>
      </div>
    </div>

    <h1 class="user-name">Kyle Bernard Trimidal</h1>
    <p class="user-role">User</p>

    <div class="user-contact">
      <span>KyleAlab79@gmail.com</span>
      <div class="id-wrapper">
        <ion-icon name="copy-outline"></ion-icon>
        <span>LF20138347</span>
      </div>
    </div>
  </div>

  <div class="bottom-sheet">
    <div class="header-row">
      <ion-icon
        name="arrow-back-outline"
        class="back-btn"
        (click)="goBack()"
      ></ion-icon>
      <h1 class="page-title">My Profile</h1>
      <div class="spacer"></div>
    </div>

    <div class="stats-card">
      <div class="stat-item">
        <ion-icon name="briefcase-outline"></ion-icon>
        <div class="stat-value">24</div>
        <div class="stat-label">Total Items</div>
      </div>
      <div class="stat-item">
        <ion-icon name="shirt-outline"></ion-icon>
        <div class="stat-value">8</div>
        <div class="stat-label">Outfits</div>
      </div>
      <div class="stat-item">
        <ion-icon name="bookmark-outline"></ion-icon>
        <div class="stat-value">3</div>
        <div class="stat-label">Favorites</div>
      </div>
    </div>

    <div class="menu-list-wrapper">
      <div
        class="menu-item"
        *ngFor="let item of menuItems"
        (click)="navigateTo(item.route)"
      >
        <div class="menu-prefix">
          <ion-icon [name]="item.icon" [style.color]="item.color"></ion-icon>
          <span class="menu-label">{{ item.label }}</span>
        </div>
        <ion-icon name="chevron-forward-outline" class="chevron"></ion-icon>
      </div>
    </div>

    <button class="logout-btn" (click)="logout()">
      <ion-icon name="log-out-outline"></ion-icon>
      <span>LogOut</span>
    </button>

    <div class="bottom-spacer"></div>
  </div>
</ion-content>
<app-bottom-nav></app-bottom-nav>
