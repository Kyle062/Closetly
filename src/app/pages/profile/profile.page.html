<ion-content [fullscreen]="true" class="profile-bg">
  
  <div class="top-bar">
    <div class="logo-placeholder">
      <img src="assets/icon/logo-small.png" alt="Logo" />
    </div>
    <ion-icon name="menu-outline" class="menu-trigger"></ion-icon>
  </div>

  <div class="profile-header">
    <div class="avatar-wrapper">
      <img src="placeholder-user.jpg" alt="User Avatar" class="avatar-img" />
      <div class="edit-icon-badge">
        <ion-icon name="pencil-outline"></ion-icon>
      </div>
    </div>
    
    <h1 class="user-name">Kyle Bernard Trimidal</h1>
    <p class="user-role">User</p>
    
    <div class="user-contact">
      <span>KyleAlab79@gmail.com</span>
      <div class="id-wrapper">
        <ion-icon name="copy-outline"></ion-icon>
        <span>LF20138347</span>
      </div>
    </div>
  </div>

  <div class="glass-container">
    
    <div class="stats-card">
      <div class="stat-item">
        <ion-icon name="briefcase-outline"></ion-icon>
        <div class="stat-value">24</div>
        <div class="stat-label">Total Items</div>
      </div>
      <div class="stat-item">
        <ion-icon name="shirt-outline"></ion-icon>
        <div class="stat-value">8</div>
        <div class="stat-label">Favorite Outfits</div>
      </div>
      <div class="stat-item">
        <ion-icon name="bookmark-outline"></ion-icon>
        <div class="stat-value">3</div>
        <div class="stat-label">Day Streak</div>
      </div>
    </div>

    <div class="menu-list-wrapper">
      <div class="menu-item ion-activatable ripple-parent" *ngFor="let item of menuItems">
        <div class="menu-prefix">
          <ion-icon [name]="item.icon" [style.color]="item.color"></ion-icon>
          <span class="menu-label">{{ item.label }}</span>
        </div>
        <ion-icon name="chevron-forward-outline" class="chevron"></ion-icon>
        <ion-ripple-effect></ion-ripple-effect>
      </div>
    </div>

    <button class="logout-btn ion-activatable ripple-parent" (click)="logout()">
      <ion-icon name="log-out-outline"></ion-icon>
      <span>LogOut</span>
      <ion-ripple-effect></ion-ripple-effect>
    </button>

  </div>
</ion-content>
