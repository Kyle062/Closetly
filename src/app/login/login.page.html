<ion-content [fullscreen]="true" class="login-content">
  <!-- Custom Pill Alert -->
  <div class="custom-alert-overlay" *ngIf="showCustomAlert">
    <div
      class="custom-alert-pill"
      [class.success]="alertType === 'success'"
      [class.error]="alertType === 'error'"
    >
      <ion-icon name="checkmark-circle-outline" class="alert-icon"></ion-icon>
      <span class="alert-message">{{ alertMessage }}</span>
    </div>
  </div>

  <div class="top-section-container">
    <div class="header-overlay">
      <ion-icon
        name="arrow-back-outline"
        class="back-icon"
        (click)="goBack()"
      ></ion-icon>
      <ion-text class="sign-up-text" (click)="goToSignup()">Sign Up</ion-text>
    </div>

    <div class="top-section">
      <img
        src="../../assets/ClosetlyLogoBlack.png"
        alt="Closetly Logo"
        class="closetly-logo-img"
      />
      <p class="motto">Your Digital Wardrobe Manager</p>

      <h2 class="welcome-back">Welcome back!</h2>
      <p class="to-your-collection">to your collection</p>
      <p class="please-sign-in">Please Sign in to continue.</p>
    </div>
  </div>

  <div class="login-card">
    <div class="form-container">
      <ion-label class="form-label">Username/Email:</ion-label>
      <ion-item lines="none" class="login-input-item">
        <ion-icon slot="start" name="person-outline"></ion-icon>
        <ion-input
          type="text"
          placeholder="username or email"
          [(ngModel)]="email"
        ></ion-input>
      </ion-item>

      <ion-label class="form-label">Password:</ion-label>
      <ion-item lines="none" class="login-input-item">
        <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          placeholder="············"
          [(ngModel)]="password"
        ></ion-input>
        <ion-icon
          slot="end"
          [name]="showPassword ? 'eye-outline' : 'eye-off-outline'"
          class="eye-icon"
          (click)="togglePasswordVisibility()"
        ></ion-icon>
      </ion-item>

      <ion-note class="forgot-password" (click)="forgotPassword()">
        Forgot password?
      </ion-note>

      <ion-item lines="none" class="remember-me-item">
        <ion-checkbox slot="start" [(ngModel)]="rememberMe"></ion-checkbox>
        <ion-label>Remember me</ion-label>
      </ion-item>

      <ion-button expand="block" class="login-button" (click)="onLogin()">
        LOG IN
      </ion-button>

      <div class="divider">
        <div class="line"></div>
        <span>or continue with</span>
        <div class="line"></div>
      </div>

      <div class="social-logins">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
          alt="Google"
          class="social-icon google"
          (click)="loginWithGoogle()"
        />
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/c/cd/Facebook_logo_%28square%29.png"
          alt="Facebook"
          class="social-icon facebook"
          (click)="loginWithFacebook()"
        />
      </div>

      <div class="register-section">
        <p>
          Doesn't have an account?
          <span class="register-link" (click)="goToSignup()">Register</span>
        </p>
      </div>

      <div class="footer-section">
        <p>© 2026 Closetly. All rights reserved.</p>
      </div>
    </div>
  </div>
</ion-content>
