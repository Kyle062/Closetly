<ion-content [fullscreen]="true" class="signup-content">
  <div class="top-section-container">
    <div class="header-overlay">
      <ion-icon
        name="arrow-back-outline"
        class="back-icon"
        (click)="goBack()"
      ></ion-icon>
      <ion-text class="login-text" (click)="goToLogin()">Log In</ion-text>
    </div>

    <div class="top-section">
      <img
        src="../../assets/ClosetlyLogoBlack.png"
        alt="Closetly Logo"
        class="closetly-logo"
      />
      <p class="motto">Your Digital Wardrobe Manager</p>

      <h2 class="create-account">
        <span class="create-text">Create </span>
        <span class="account-text">account</span>
      </h2>
      <p class="subtitle">Sign up to get started!</p>
    </div>
  </div>

  <div class="signup-card">
    <div class="form-container">
      <ion-label class="form-label">Username:</ion-label>
      <ion-item lines="none" class="input-item">
        <ion-icon slot="start" name="person-outline"></ion-icon>
        <ion-input
          type="text"
          placeholder="kyle12345"
          [(ngModel)]="username"
        ></ion-input>
      </ion-item>

      <ion-label class="form-label">Email:</ion-label>
      <ion-item lines="none" class="input-item">
        <ion-icon slot="start" name="mail-outline"></ion-icon>
        <ion-input
          type="email"
          placeholder="kylebernard@gmail.com"
          [(ngModel)]="email"
        ></ion-input>
      </ion-item>

      <ion-label class="form-label">Create Password:</ion-label>
      <ion-item lines="none" class="input-item">
        <ion-icon slot="start" name="key-outline"></ion-icon>
        <ion-input
          type="password"
          placeholder="············"
          [(ngModel)]="password"
        ></ion-input>
        <ion-icon slot="end" name="eye-off-outline" class="eye-icon"></ion-icon>
      </ion-item>

      <ion-label class="form-label">Confirm Password:</ion-label>
      <ion-item lines="none" class="input-item">
        <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
        <ion-input
          type="password"
          placeholder="············"
          [(ngModel)]="confirmPassword"
        ></ion-input>
        <ion-icon slot="end" name="eye-off-outline" class="eye-icon"></ion-icon>
      </ion-item>

      <ion-item lines="none" class="remember-me-item">
        <ion-checkbox slot="start" [(ngModel)]="rememberMe"></ion-checkbox>
        <ion-label>Remember me</ion-label>
      </ion-item>

      <ion-button expand="block" class="signup-button" (click)="onSignup()">
        SIGN UP
      </ion-button>

      <div class="divider">
        <div class="line"></div>
        <span>or continue with</span>
        <div class="line"></div>
      </div>

      <div class="social-logins">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
          alt="Google"
          class="social-icon google"
          (click)="signupWithGoogle()"
        />
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/c/cd/Facebook_logo_%28square%29.png"
          alt="Facebook"
          class="social-icon facebook"
          (click)="signupWithFacebook()"
        />
      </div>

      <div class="login-section">
        <p>
          Already have an account?
          <span class="login-link" (click)="goToLogin()">Log In</span>
        </p>
      </div>

      <div class="footer-section">
        <p>© 2026 Closetly. All rights reserved.</p>
      </div>
    </div>
  </div>
</ion-content>
